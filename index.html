<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Majestic Garage Doors — Premium custom garage doors crafted with luxury, precision, and uncompromising quality.">
  <title>Majestic Garage Doors | Crafted Beyond Perfection</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon (SVG) -->
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
</head>
<body>

  <!-- ── Loading Overlay ──────────────────────────────── -->
  <div class="loading-overlay" id="loadingOverlay">
    <img src="assets/logo.svg" alt="Majestic" class="loading-overlay__logo">
    <div class="loading-overlay__bar-track">
      <div class="loading-overlay__bar-fill" id="loadingBar"></div>
    </div>
  </div>

  <!-- ── Navbar ───────────────────────────────────────── -->
  <nav class="navbar navbar--hidden" id="navbar">
    <div class="navbar__brand">
      <img src="assets/logo.svg" alt="Majestic Garage Doors" class="navbar__logo">
      <span class="navbar__brand-text">Majestic</span>
    </div>
    <ul class="navbar__links">
      <li><a href="#" class="navbar__link" id="nav-home">Home</a></li>
      <li><a href="#" class="navbar__link" id="nav-services">Services</a></li>
      <li><a href="#" class="navbar__link" id="nav-configurator">Configurator</a></li>
      <li><a href="#" class="navbar__link" id="nav-about">About</a></li>
      <li><a href="#" class="navbar__link" id="nav-contact">Contact</a></li>
    </ul>
    <button class="navbar__cta" id="nav-quote">Get a Quote</button>
  </nav>

  <!-- ── Hero Section ─────────────────────────────────── -->
  <section class="hero" id="hero">
    <video class="hero__video" id="heroVideo"
           preload="auto" muted playsinline>
      <source src="assets/herovid_scroll.mp4" type="video/mp4">
    </video>

    <div class="hero__overlay-top"></div>
    <div class="hero__overlay"></div>

    <!-- Tagline (appears after video ends) -->
    <div class="hero__tagline" id="heroTagline">
      <h1>
        <span class="tagline--semibold">Crafted</span>
        <span class="tagline--bold">Beyond Perfection</span>
      </h1>
      <div class="hero__tagline-line" id="taglineLine"></div>
    </div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator" id="scrollIndicator">
      <div class="scroll-indicator__mouse">
        <div class="scroll-indicator__wheel"></div>
      </div>
      <span class="scroll-indicator__text">Scroll</span>
    </div>
  </section>

  <!-- ── Main Content ─────────────────────────────────── -->
  <main class="content" id="mainContent">
    <section class="content__placeholder">
      <p>Excellence in every detail</p>
    </section>
  </main>

  <!-- ── Scripts ──────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
